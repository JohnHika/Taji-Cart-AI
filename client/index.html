<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="canonical" href="https://nawirihairke.com/" />
    <link rel="icon" type="image/jpeg" href="/images/nawiri_logo.jpeg" />
    <link rel="shortcut icon" href="/images/nawiri_logo.jpeg" />
    <link rel="apple-touch-icon" href="/images/nawiri_logo.jpeg" />
    <meta property="og:url" content="https://nawirihairke.com/" />
    <meta property="og:image" content="https://nawirihairke.com/images/nawiri_logo.jpeg" />
    <script>
      (function () {
        var canonicalHost = 'nawirihairke.com';
        var currentHost = window.location.hostname;
        var shouldUseCanonicalHost = currentHost === 'www.' + canonicalHost || currentHost === canonicalHost;
        var shouldRedirectToHttps = window.location.protocol === 'http:';
        var shouldRedirectToApex = currentHost === 'www.' + canonicalHost;

        if (shouldUseCanonicalHost && (shouldRedirectToHttps || shouldRedirectToApex)) {
          var canonicalUrl = 'https://' + canonicalHost + window.location.pathname + window.location.search + window.location.hash;
          window.location.replace(canonicalUrl);
        }
      })();
    </script>
    <title>NAWIRI HAIR</title>
  </head>
  <body>
    <div id="root"></div> <!-- Ensure this id matches the target in ReactDOM.render -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
