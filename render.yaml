# Render Blueprint for Taji-Cart-AI
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: taji-cart-server
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NAWIRI_OFFLINE_MODE
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SECRET_KEY_ACCESS_TOKEN
        sync: false
      - key: SECRET_KEY_REFRESH_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET_KEY
        sync: false
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false

  - type: static_site
    name: taji-cart-client
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        sync: false
      - key: VITE_BACKEND_URL
        sync: false
      - key: VITE_API_URL
        value: /api
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_WEATHERAPI_KEY
        sync: false
      - key: VITE_STRIPE_PUBLIC_KEY
        sync: false
