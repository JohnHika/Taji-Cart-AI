name: Deploy Taji-Cart-AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test Application
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json
    
    - name: Install Client Dependencies
      run: |
        cd client
        npm ci
    
    - name: Install Server Dependencies
      run: |
        cd server
        npm ci
    
    - name: Lint Client
      run: |
        cd client
        npm run lint
    
    - name: Build Client
      run: |
        cd client
        npm run build
    
    - name: Test Server
      run: |
        cd server
        npm test || echo "No tests configured"

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json
    
    - name: Install Client Dependencies
      run: |
        cd client
        npm ci
    
    - name: Build Client for Production
      run: |
        cd client
        VITE_API_URL=${{ secrets.VITE_API_URL || 'https://your-backend-url.herokuapp.com' }} npm run build
    
    - name: Deploy Frontend to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./client/dist
        cname: ${{ secrets.CUSTOM_DOMAIN }}
    
    - name: Deploy Backend to Heroku
      uses: akhileshns/heroku-deploy@v3.12.14
      with:
        heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
        heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
        heroku_email: ${{ secrets.HEROKU_EMAIL }}
        appdir: "server"
        dockerfile_path: "server/Dockerfile"
        dockerfile_directory: "."
        usedocker: true
      if: ${{ secrets.HEROKU_API_KEY }}

  deploy-docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: ${{ secrets.DOCKER_USERNAME }}
    
    - name: Build and push Backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./server
        file: ./server/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taji-cart-backend:latest
      if: ${{ secrets.DOCKER_USERNAME }}
    
    - name: Build and push Frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./client
        file: ./client/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taji-cart-frontend:latest
      if: ${{ secrets.DOCKER_USERNAME }}
