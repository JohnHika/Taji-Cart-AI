version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: taji-cart-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-taji_cart}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - taji-cart-network

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: taji-cart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/${MONGO_DB_NAME:-taji_cart}
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/usr/src/app/uploads
    networks:
      - taji-cart-network

  frontend:
    build: 
      context: ./client
      dockerfile: Dockerfile
    container_name: taji-cart-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - taji-cart-network

  redis:
    image: redis:7-alpine
    container_name: taji-cart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - taji-cart-network

networks:
  taji-cart-network:
    driver: bridge

volumes:
  mongodb_data:
  backend_uploads:
  redis_data:
