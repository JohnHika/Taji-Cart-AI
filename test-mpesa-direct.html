<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Pesa Direct Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #22c55e; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; }
        button:hover { background: #16a34a; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .result { padding: 15px; border-radius: 5px; margin-top: 20px; }
        .success { background: #dcfce7; border: 1px solid #22c55e; color: #166534; }
        .error { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; }
        .info { background: #dbeafe; border: 1px solid #3b82f6; color: #1e40af; }
        pre { background: #f3f4f6; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 M-Pesa Direct Payment Test</h1>
    <p>Test payment with phone: <strong>254708379882</strong> (Sandbox)</p>

    <div class="form-group">
        <label for="phone">Phone Number:</label>
        <input type="text" id="phone" value="254708379882" placeholder="254708379882">
        <small style="color: #666;">Use sandbox test number: 254708379882</small>
    </div>

    <div class="form-group">
        <label for="amount">Amount (KSh):</label>
        <input type="number" id="amount" value="10" min="1" max="1000">
        <small style="color: #666;">Start with small amount like KSh 10</small>
    </div>

    <button id="payBtn" onclick="initiatePayment()">💰 Pay via M-Pesa Direct</button>

    <div id="result"></div>

    <script>
        async function initiatePayment() {
            const phone = document.getElementById('phone').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const btn = document.getElementById('payBtn');
            const resultDiv = document.getElementById('result');

            if (!phone || phone.length < 10) {
                resultDiv.innerHTML = '<div class="error">❌ Please enter a valid phone number</div>';
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Sending STK Push...';

            try {
                // Create a test order
                const response = await fetch('http://localhost:3001/api/mpesa-direct/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phoneNumber: phone,
                        amount: amount,
                        userId: 'guest',
                        list_items: [
                            {
                                productId: '69d3c688766a4a8b0954aac2',
                                quantity: 1,
                                name: 'FRENCH CURLS',
                                price: amount
                            }
                        ],
                        subTotalAmt: amount,
                        totalAmt: amount,
                        guestEmail: 'test@example.com',
                        guestPhone: phone,
                        guestShipping: {
                            name: 'Test User',
                            address: 'Test Address',
                            city: 'Nairobi',
                            phone: phone
                        },
                        fulfillment_type: 'delivery'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ STK Push Sent!</h3>
                            <p><strong>Message:</strong> ${data.message}</p>
                            <p><strong>Order ID:</strong> ${data.orderId}</p>
                            <p><strong>Unique Code:</strong> ${data.orderReference}</p>
                            <p><strong>Transaction ID:</strong> ${data.transactionId}</p>
                            <hr style="margin: 15px 0; border: none; border-top: 1px solid #22c55e;">
                            <p><strong>📱 CHECK YOUR PHONE NOW!</strong></p>
                            <p>You should receive an M-Pesa message on <strong>${phone}</strong></p>
                            <p>Enter your PIN to complete payment.</p>
                        </div>
                        <div class="info">
                            <h4>What happens next:</h4>
                            <ol>
                                <li>Enter M-Pesa PIN on your phone</li>
                                <li>Payment will be confirmed automatically</li>
                                <li>You'll receive SMS with unique code</li>
                                <li>Order will be saved in database</li>
                            </ol>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Payment Failed</h3>
                            <p><strong>Error:</strong> ${data.message}</p>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                            <p><strong>Troubleshooting:</strong></p>
                            <ul>
                                <li>Use sandbox test number: 254708379882</li>
                                <li>Ensure server is running on port 3001</li>
                                <li>Check M-Pesa credentials in .env</li>
                                <li>Wait 1 minute and try again</li>
                            </ul>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Network Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <pre>${error.stack || 'No stack trace'}</pre>
                        <p>Make sure the server is running on http://localhost:3001</p>
                        <p>Try: curl http://localhost:3001/api/mpesa-direct/pay</p>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btn.textContent = '💰 Pay via M-Pesa Direct';
            }
        }
    </script>
</body>
</html>
